# Server Configuration
server.port=8080
spring.application.name=food_ordering-1

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/irctc_food_db_1?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Use a secure 256-bit secret - DO NOT CHANGE THIS AFTER GENERATING TOKENS)
jwt.secret=irctcFoodOrderingServiceSecretKey2024ThisIsAVeryLongSecretKeyForHS256Algorithm
jwt.expiration=86400000

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.irctc.food=DEBUG